<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tech-Mart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <nav>
            <a href="#">Home</a>
            
            <div class="menu-adicionar">
                <button id="btn-abrir-form">Cadastrar Produto</button>
                <div id="form-produto" class="form-produto">
                    <input type="text" id="nome-produto" placeholder="Nome">
                    <input type="number" id="preco-produto" placeholder="Preço">
                    <input type="text" id="imagem-produto" placeholder="URL da imagem">
                    <button id="btn-adicionar">Adicionar</button>
                </div>
            </div>
            

            <h1 class="logo">Tech-Mart</h1>

            <a href="#">Portfolio</a>
            <a href="#" id="btn-carrinho">Carrinho (0)</a>
        </nav>
    </header>

    <section class="Banner">

        <div class="overlay"></div>

        <div class="conteudo">
            <h1>Tech Mart</h1>
            <p>PRODUTO PARA TODO O BRASIL</p>

            <input type="text" placeholder="Buscar produtos...">
        </div>

    </section>

    <section class="produtos">

        <section class="titulo">
            <header>
                <h2>Nossos Produtos</h2>
            </header>
        </section>

        <div class="lista-produtos">

            <div class="produto">
                <img src="assets/products/Mouse.webp">
                <h3>Mouse Gamer</h3>
                <p>R$ 99.90</p>
                <button class="comprar" data-nome="Mouse Gamer" data-preco="99.90">Comprar</button>
            </div>
            
            <div class="produto">
                <img src="assets/products/Monitor_Gamer.jpg">
                <h3>Monitor 144Hz</h3>
                <P>R$ 459.00</P>
                <button class="comprar" data-nome="Monitor" data-preco="459.00">Comprar</button>
            </div>

            <div class="produto">
                <img src="assets/products/Teclado.jpg">
                <h3>Teclado mecânico</h3>
                <p>R$ 199.90</p>
                <button class="comprar" data-nome="Teclado mecânico" data-preco="199.90">Comprar</button>
            </div>

            <div class="produto">
                <img src="assets/products/Gabinete_Gamer.webp">
                <h3>Gabinete Gamer</h3>
                <P>R$ 89.00</P>
                <button class="comprar" data-nome="Gabinete" data-preco="89.00">Comprar</button>
            </div>


        </div>
    </section>

    <div id="overlay" class="overlay-carrinho"></div>
    <div id="painel-carrinho" class="painel-carrinho">
        <h2>Seu Carrinho</h2>
        <ul id="lista-carrinho"></ul>
        <p id="total">Total: R$ 0.00 </p>
        <button id="prosseguir">Prosseguir</button>
    </div>


    <script src="script.js"></script>
</body>
</html>
